github:
  apiBaseUrl: https://api.github.com

azure:
  prefix: release-sync

concurrency:
  workflowMaxParallel: 2
  maxParallelAssets: 2

providers:
  pan123:
    errorDetailLevel: diagnostic
    apiBaseUrl: https://open-api.123pan.com

repositories:
